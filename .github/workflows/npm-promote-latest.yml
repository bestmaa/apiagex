name: Promote npm packages to latest

on:
  push:
    tags:
      - npm-promote-v*
      - npm-promote-latest-v*
  workflow_dispatch:
    inputs:
      version:
        description: Existing npm version to promote
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-promote-latest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    name: Move npm latest dist-tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          elif [[ "$GITHUB_REF_NAME" == npm-promote-latest-v* ]]; then
            version="${GITHUB_REF_NAME#npm-promote-latest-v}"
          else
            version="${GITHUB_REF_NAME#npm-promote-v}"
            version="${version%-latest}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Promoting npm packages to latest: $version"

      - name: Promote packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          packages=(
            "@apiagex/database"
            "@apiagex/server"
            "create-apiagex"
          )

          for package_name in "${packages[@]}"; do
            npm view "${package_name}@${VERSION}" version
            current_latest="$(npm view "$package_name" dist-tags.latest || true)"
            if [ "$current_latest" = "$VERSION" ]; then
              echo "${package_name} already latest=${VERSION}"
            else
              npm dist-tag add "${package_name}@${VERSION}" latest
            fi
          done

      - name: Verify latest tags
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for package_name in "@apiagex/database" "@apiagex/server" "create-apiagex"; do
            latest=""
            for attempt in 1 2 3 4 5 6; do
              latest="$(npm view "$package_name" dist-tags.latest)"
              if [ "$latest" = "$VERSION" ]; then
                break
              fi
              echo "${package_name} latest=${latest}; waiting for ${VERSION} (attempt ${attempt})"
              sleep 10
            done
            if [ "$latest" != "$VERSION" ]; then
              echo "::error::${package_name} latest is ${latest}, expected ${VERSION}"
              exit 1
            fi
            echo "${package_name} latest=${latest}"
          done
