name: Publish npm packages

on:
  push:
    branches:
      - main
    tags:
      - npm-v*
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish workspace packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Stop if versions already exist
        if: ${{ startsWith(github.ref, 'refs/tags/npm-v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        shell: bash
        run: |
          set -euo pipefail
          declare -A package_paths=(
            ["apiagex-database"]="packages/database/package.json"
            ["apiagex-server"]="packages/server/package.json"
            ["create-apiagex"]="packages/create-apiagex/package.json"
          )
          for package_name in "apiagex-database" "apiagex-server" "create-apiagex"; do
            package_path="${package_paths[$package_name]}"
            package_version="$(node -p "require('./${package_path}').version")"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "::error::${package_name}@${package_version} already exists on npm. Bump versions before publishing."
              exit 1
            fi
          done

      - name: Publish packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.tag || 'latest' }}
          DRY_RUN: ${{ !startsWith(github.ref, 'refs/tags/npm-v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run) }}
        run: |
          set -euo pipefail
          publish_flags=(--access public --tag "$NPM_TAG" --provenance)
          if [ "$DRY_RUN" = "true" ]; then
            publish_flags+=(--dry-run)
          fi

          npm publish -w apiagex-database "${publish_flags[@]}"
          npm publish -w apiagex-server "${publish_flags[@]}"
          npm publish -w create-apiagex "${publish_flags[@]}"
